version: "3.9"

# Production overrides — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    restart: always
    volumes: []
    command: gunicorn -w 4 -k gevent -b 0.0.0.0:5000 --access-logfile - --error-logfile - run:app
    environment:
      FLASK_ENV: production

  celery:
    restart: always
    volumes: []
    command: celery -A app.tasks.celery_app.celery worker --loglevel=warning --concurrency=4

  celery-beat:
    restart: always
    volumes: []
    command: celery -A app.tasks.celery_app.celery beat --loglevel=warning

  frontend:
    restart: always

  nginx:
    restart: always

volumes:
  pgdata_prod:
